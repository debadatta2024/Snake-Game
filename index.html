<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snake-game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="infos">
            <div class="info">
                <h3>HIGH SCORE: <span id="high-score">0</span></h3>
            </div>
            <div class="info">
                <h3>SCORE: <span id="score">0</span></h3>
            </div>
            <div class="info">
                <h3>TIME: <span id="time">00:00</span></h3>
            </div>
        </div>
        <div class="board">
        </div>
        <div class="modal">
            <div class="start-game">
                <h1>Welcome To The Snake Game</h1>
                <button class="btn start-btn">Start Game</button>
            </div>
            <div class="end-game">
                <h1>Game Over</h1>
                <button class="btn restart-btn">Restart Game</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
